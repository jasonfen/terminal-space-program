name: release

on:
  push:
    tags:
      - 'v*'
      # Goreleaser only handles strict SemVer (vMAJOR.MINOR.PATCH).
      # Four-part patch tags (vX.Y.Z.N) are checkpoint markers, not
      # release-binary triggers — exclude them so the workflow stays
      # green on minor patch tags like v0.8.6.1.
      - '!v*.*.*.*'

permissions:
  contents: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
