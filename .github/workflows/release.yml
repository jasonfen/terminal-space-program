name: release

on:
  push:
    tags:
      - 'v*'
      # Goreleaser only handles strict SemVer (vMAJOR.MINOR.PATCH).
      # Four-part patch tags (vX.Y.Z.N) are checkpoint markers, not
      # release-binary triggers — exclude them so the workflow stays
      # green on minor patch tags like v0.8.6.1.
      - '!v*.*.*.*'

permissions:
  contents: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Creates the GitHub release + uploads archives (scoped to this repo).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on jasonfen/homebrew-tap and
          # jasonfen/scoop-bucket — the default GITHUB_TOKEN can't push to
          # other repos. Falls back to GITHUB_TOKEN if the secret is unset,
          # so a release without the secret still publishes binaries (the
          # cask/scoop steps will fail loudly rather than silently skip).
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
